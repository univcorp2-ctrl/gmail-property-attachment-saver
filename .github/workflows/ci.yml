name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run lint
      - run: npm test
      - name: Upload analysis config artifact
        uses: actions/upload-artifact@v4
        with:
          name: property-analysis-config
          path: |
            config/analysis_rules.json
            docs/*.md
